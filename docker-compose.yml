services:
  db_trading:
    image: postgres:16-alpine
    container_name: trading_bot_db
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_password
      POSTGRES_DB: trading_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata_trading:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: trading_bot_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db_trading
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./web:/app/web
      - .env:/app/.env
    depends_on:
      db_trading:
        condition: service_healthy

volumes:
  pgdata_trading:
